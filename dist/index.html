<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movie World Drive-In</title>
  <link rel="stylesheet" href="/stylesheet/style.css" />

  <!-- Import map for loading the Three.js module from CDN -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js"
      }
    }
  </script>
</head>
<body>
  <div id="startScreen">
    <h1>Movie World Drive-In</h1>
    <p>
      You only know superhero movies. Drive through the world and discover new movie genres.
    </p>
    <button id="startBtn">Start Driving</button>
  </div>

  <div id="hud">
    <h2 id="currentGenre">Explore the world</h2>
    <p>Use W A S D or Arrow Keys to drive. Go near a theater to open its movie screen.</p>
  </div>

  <div id="moviePanel" class="hidden">
    <!-- Movie detail panel shown when the car is near a theater -->
    <button id="closePanel">×</button>
    <h2 id="panelTitle">Genre</h2>
    <p id="panelDescription"></p>

    <div id="movieContent">
      <div id="movieList"></div>

      <div id="previewBox">
        <h3>Trailer Preview</h3>
        <iframe
          id="trailerFrame"
          src=""
          title="Movie trailer"
          allowfullscreen>
        </iframe>
      </div>
    </div>
  </div>

  <!-- WebGL canvas where the Three.js scene is rendered -->
  <canvas id="world"></canvas>

  <script type="module" src="/js/three.js"></script>
</body>
</html>
